<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者コントロールパネル</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/administrator.css') }}">
</head>
<body>

    <h1>🛠️ ADMINISTRATOR PANEL</h1>

    <!-- 掲示板・ニュース編集セクション -->
    <div class="section">
        <div id="status">📢 掲示板（ニュース）の編集</div>
        <p class="section-desc">入力したテキストが、メインディスプレイの掲示板エリアにリアルタイムで同期・表示されます。</p>
        
        <div class="textarea-wrapper">
            <!-- 現在のニュースが自動で読み込まれます -->
            <textarea id="news-input" placeholder="ここにニュースを入力してください...（改行もそのまま反映されます）"></textarea>
        </div>

        <div class="action-row">
            <span id="status-message" class="status-message"></span>
            <button id="submit-news-btn">掲示板を更新する</button>
        </div>
    </div>

    <!-- ナビゲーション（既存のデザインを踏襲） -->
    <nav>
        <a href="/client">📱 チーム操作 (Client)</a>
        <a href="/display" target="_blank">📺 メインディスプレイ</a>
        <a href="/logout" class="logout-link">🔒 ログアウト</a>
    </nav>

    <script src="{{ url_for('static', filename='js/administrator.js') }}"></script>
</body>
</html>
