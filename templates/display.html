<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <link rel="stylesheet" href="static/display.css">
</head>

<body>

<!-- =========================
     ナビゲーション（維持）
========================= -->
<nav>
    <a href="/">抽選</a>
    <a href="/display" class="active">スコア表示</a>
    <a href="/rules">ルール</a> 
</nav>

<!-- =========================
     上部グラデーション（これだけを上に残す）
========================= -->
<div id="difficultyBar">
    <div class="grad"></div>
    <div class="label left">易</div>
    <div class="label right">難</div>
    <!-- スケール線 -->
    <div class="ticks"></div>
</div>

<!-- =========================
     メインレイアウト
========================= -->
<main>

    <!-- =========================
         レーン表示
    ========================== -->
    <section id="lanes"></section>

    <!-- =========================
         掲示板（下に3つ分置くイメージで大きく拡張）
    ========================== -->
    <section id="board">
        <h2>掲示板</h2>
        <div id="boardContent"></div>
    </section>

</main>

<!-- =========================
     ランキング（完全分離・維持）
========================= -->
<footer id="ranking">
    <div class="title">RANKING</div>

    <div class="rankBox">
        <span>🥇</span>
        <span id="scoreRank1">---</span>
    </div>

    <div class="rankBox">
        <span>🥈</span>
        <span id="scoreRank2">---</span>
    </div>

    <div class="rankBox">
        <span>🥉</span>
        <span id="scoreRank3">---</span>
    </div>
</footer>

<script src="static/display.js"></script>

</body>
</html>
