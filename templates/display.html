<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Display - Compact</title>
    <link rel="stylesheet" href="static/display.css">
</head>
<body>

<nav>
    <a href="/client">抽選</a>
    <a href="/display" class="active">スコア表示</a>
    <a href="/rules">ルール</a> 
</nav>

<!-- 縦幅を抑えるため、極薄のライン型グラデーションに変更 -->
<div id="difficultyBar">
    <div class="grad"></div>
    <div class="label left"><h1>易</h1></div>
    <div class="label right"><h1>難</h1></div>
</div>

<main>
    <!-- レーン表示エリア -->
    <section id="lanes"></section>

    <!-- 掲示板（レーンと高さを揃えて横並びに） -->
    <section id="board">
        <h2>掲示板</h2>
        <!-- 掲示板エリア -->
        <div class="news-board">
            <div class="news-label">NEWS</div>
            <div id="news-content" class="news-content">読み込み中...</div>
        </div>
    </section>
</main>

<footer id="ranking">
    <div class="title">RANKING</div>
    <div class="rankBox"><span></span><span id="scoreRank1">---</span></div>
    <div class="rankBox"><span></span><span id="scoreRank2">---</span></div>
    <div class="rankBox"><span></span><span id="scoreRank3">---</span></div>
</footer>

<script src="static/display.js"></script>
</body>
</html>
