<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <link rel="stylesheet" href="display.css">
</head>

<body>

<!-- =========================
    ナビゲーション領域確保
========================= -->
<nav id="topNav">
    <!-- 将来的なメニュー用スペース -->
</nav>

<!-- =========================
    上部グラデーション（1つだけ）
========================= -->
<div id="difficultyBar">
    <div class="grad"></div>

    <div class="label left">易</div>
    <div class="label right">難</div>

    <!-- スケール線 -->
    <div class="ticks"></div>
</div>

<!-- =========================
    メインレイアウト
========================= -->
<main>

    <!-- =========================
        レーン表示
    ========================== -->
    <section id="lanes"></section>

    <!-- =========================
        掲示板（独立）
    ========================== -->
    <section id="board">
        <h2>掲示板</h2>
        <div id="boardContent"></div>
    </section>

</main>

<!-- =========================
    ランキング（完全分離）
========================= -->
<footer id="ranking">
    <div class="title">RANKING</div>

    <div class="rankBox">
        <span>🥇</span>
        <span id="scoreRank1">---</span>
    </div>

    <div class="rankBox">
        <span>🥈</span>
        <span id="scoreRank2">---</span>
    </div>

    <div class="rankBox">
        <span>🥉</span>
        <span id="scoreRank3">---</span>
    </div>
</footer>

<script src="display.js"></script>

</body>
</html>
