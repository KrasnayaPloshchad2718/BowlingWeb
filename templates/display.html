<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 上部：難易度バー（1つだけ） -->
  <header class="top-bar">
    <div class="difficulty">
      <span>難易度</span>
      <div class="bar">
        <div class="fill" style="width: 50%;"></div>
      </div>
    </div>
  </header>

  <!-- メイン領域 -->
  <main class="container">

    <!-- レーンエリア -->
    <section class="lanes">

      <!-- レーン1 -->
      <div class="lane-row">
        <div class="lane lane-1">
          <p>LANE 1</p>
        </div>

        <!-- レーン1の右：情報パネル -->
        <aside class="lane-info">
          <div class="panel">
            <h3>レーン1情報</h3>
            <p>スコア / 状態</p>
          </div>
        </aside>
      </div>

      <!-- レーン2 -->
      <div class="lane-row">
        <div class="lane lane-2">
          <p>LANE 2</p>
        </div>
      </div>

      <!-- レーン3 -->
      <div class="lane-row">
        <div class="lane lane-3">
          <p>LANE 3</p>
        </div>
      </div>

    </section>

    <!-- 右側：ランキング（掲示板と分離） -->
    <aside class="sidebar">
      <div class="ranking">
        <h2>ランキング</h2>
        <ol>
          <li>AAA - 9999</li>
          <li>BBB - 8500</li>
          <li>CCC - 7200</li>
        </ol>
      </div>
    </aside>

  </main>

  <!-- 掲示板（ランキングとは別枠） -->
  <footer class="board">
    <h2>掲示板</h2>
    <div class="board-content">
      <p>ここにメッセージ</p>
    </div>
  </footer>

</body>
</html>
