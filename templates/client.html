<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BowlingWeb - Client</title>

    <link rel="stylesheet" href="/static/client.css">
</head>

<body>

    <h1>BowlingWeb</h1>

    <!-- 状態 -->
    <div id="status">未接続</div>

    <hr>

    <!-- レーン選択 -->
    <div>
        レーン：
        <select id="team">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>

    <button id="startButton">開始</button>

    <hr>

    <!-- お題エリア（横並び構造化） -->
    <div class="section">
        <div class="odaiRow">
            <h2 id="A">A：</h2>
            <h3>本数:</h3><input id="scoreA" type="number" min="0" max="10">
            <button id="IsNotAchievedA" class="toggle-btn">お題未達成</button>
        </div>

        <div class="odaiRow">
            <h2 id="B">B：</h2>
            <h3>本数:</h3><input id="scoreB" type="number" min="0" max="10">
            <button id="IsNotAchievedB" class="toggle-btn">お題未達成</button>
        </div>

        <div class="odaiRow">
            <h2 id="C">C：</h2>
            <h3>本数:</h3><input id="scoreC" type="number" min="0" max="10">
            <button id="IsNotAchievedC" class="toggle-btn">お題未達成</button>
        </div>
    </div>

    <hr>

    <!-- 宣言 -->
    <div id="declareArea" style="display:none;">
        <h3>倒す本数を宣言</h3>
        <input id="declare" type="number" min="0" max="10">
    </div>

    <hr>

    <!-- 合計 -->
    <h2 id="total"></h2>

    <button id="calcButton">計算</button>

    <hr>

    <!-- QRコード表示 -->
    <div id="qr"></div>

    <hr>

    <!-- ナビ -->
    <nav>
        <a href="/client" class="active">抽選</a>
        <a href="/administrator">掲示板管理</a>
        <a href="/display">スコア表示</a>
        <a href="/rules">ルール</a>
    </nav>

    <!-- QRライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- メインロジック -->
    <script src="/static/client.js"></script>

</body>

</html>
